<!DOCTYPE html>
<html>

<head>

    <title>Salary Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #4e5ed1;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Salary Prediction Using Regression</h2>

        <form action="/predict" method="post">

            <input type="number" name="age" placeholder="Age" required>

            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <select name="education">
                <option value="Bachelor's">Bachelor's</option>
                <option value="Master's">Master's</option>
                <option value="PhD">PhD</option>
            </select>

            <input type="text" name="job" placeholder="Job Title">

            <input type="number" step="0.1" name="experience" placeholder="Years of Experience">

            <button type="submit">Predict Salary</button>

        </form>

        <div class="result">

            {{ prediction_text }}

        </div>

    </div>

</body>

</html>
